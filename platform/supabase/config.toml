# Supabase local · Celsius Platform
project_id = "celsius-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 28800            # sesiones de 8 horas (doc de arquitectura §13)
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 12  # política de contraseña fuerte (§13)

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # local dev; en producción: true

# Deshabilitado en local hasta fase 2 (PDFs de cotización): el health check
# del contenedor storage-api falla en Codespaces. En Supabase Cloud sí aplica.
[storage]
enabled = false
file_size_limit = "50MiB"

# Logflare/vector no pasan health checks en Codespaces y no se usan en dev.
[analytics]
enabled = false
