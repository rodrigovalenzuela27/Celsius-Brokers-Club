name: CI

on:
  push:
    branches: [main]
    paths: ["platform/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["platform/**", ".github/workflows/ci.yml"]

jobs:
  check:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    env:
      # Placeholders: el build no se conecta a Supabase, solo necesita
      # que las variables existan. Vercel inyecta las reales en deploy.
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: platform/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: platform/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
